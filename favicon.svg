<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d1b3e"/>
  <!-- Cat body -->
  <ellipse cx="16" cy="22" rx="7" ry="6" fill="#8c9daf"/>
  <!-- Cat head -->
  <circle cx="16" cy="13" r="6" fill="#8c9daf"/>
  <!-- Ears -->
  <polygon points="11,9 9,4 13.5,8" fill="#7a8a9a"/>
  <polygon points="21,9 23,4 18.5,8" fill="#7a8a9a"/>
  <!-- Ear inner -->
  <polygon points="11,8.5 9.5,5 13,7.5" fill="#D4AF37" opacity=".7"/>
  <polygon points="21,8.5 22.5,5 19,7.5" fill="#D4AF37" opacity=".7"/>
  <!-- Eyes -->
  <ellipse cx="13.5" cy="12.5" rx="1.4" ry="1.7" fill="#0d1b3e"/>
  <ellipse cx="18.5" cy="12.5" rx="1.4" ry="1.7" fill="#0d1b3e"/>
  <circle cx="14" cy="12" r="0.5" fill="white"/>
  <circle cx="19" cy="12" r="0.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="14.8" rx="0.8" ry="0.6" fill="#D4AF37"/>
  <!-- Gold collar -->
  <rect x="10" y="18" width="12" height="2.2" rx="1.1" fill="#D4AF37" opacity=".9"/>
  <!-- Moon top-right -->
  <path d="M 26 6 A 4 4 0 1 1 26 14 A 2.8 2.8 0 1 0 26 6" fill="#D4AF37"/>
</svg>
